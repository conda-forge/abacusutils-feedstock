schema_version: 1

context:
  name: abacusutils
  version: "2.1.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/abacusutils-${{ version }}.tar.gz
  sha256: 71b1ae66b4558cbc07f01072b35879afa22371ff55d7a2c83dd7e6ec9e38df9a

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pipe_asdf = abacusnbody.data.pipe_asdf:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61
    - setuptools-scm >=6.2
    - pip
  run:
    - astropy-base >=4.0.0
    - blosc >=1.9.2
    - python >=${{ python_min }}
    - numpy >=1.16
    - python-blosc >=1.9.2
    - astropy-base >=4.0.0
    - scipy >=1.5.0
    - numba >=0.56
    - asdf >=3.1.0
    - h5py
    - pyyaml
    - asdf-astropy >=0.3
    - msgpack-python >=1
    - parallel-numpy-rng >=0.1.2

tests:
  - python:
      imports:
        - abacusnbody.data
        - abacusnbody.hod
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pipe_asdf --help

about:
  summary: Python and C/C++ code to read halo catalogs and other Abacus N-body data products
  license: GPL-3.0-or-later
  license_file: LICENSE
  homepage: https://github.com/abacusorg/abacusutils

extra:
  recipe-maintainers:
    - jan-janssen
