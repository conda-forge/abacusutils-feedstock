{% set name = "abacusutils" %}
{% set version = "2.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/abacusutils-{{ version }}.tar.gz
  sha256: 2a1ee3eed8af02e8d424ba7307d1f7a965d15499a0947d143dd93cbc53354bfe

build:
  entry_points:
    - pipe_asdf = abacusnbody.data.pipe_asdf:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61
    - setuptools-scm >=6.2
    - pip
  run:
    - astropy >=4.0.0
    - blosc >=1.9.2
    - python >={{ python_min }}
    - numpy >=1.16
    - python-blosc >=1.9.2
    - astropy-base >=4.0.0
    - scipy >=1.5.0
    - numba >=0.56
    - asdf >=3.1.0
    - h5py
    - pyyaml
    - asdf-astropy >=0.3
    - msgpack-python >=1
    - parallel-numpy-rng >=0.1.2

test:
  imports:
    - abacusnbody.data
    - abacusnbody.hod
  commands:
    - pip check
    - pipe_asdf --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/abacusorg/abacusutils
  summary: Python and C/C++ code to read halo catalogs and other Abacus N-body data products
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
